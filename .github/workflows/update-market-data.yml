name: Atualizar dados de mercado

# Os horários abaixo usam UTC. Brasília normalmente está em UTC-3; ajuste se necessário.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: Modo da atualização
        required: true
        default: intraday
        type: choice
        options:
          - premarket
          - intraday
          - close
  schedule:
    - cron: "30 12 * * 1-5"   # Pré-pregão: 12:30 UTC
    - cron: "*/15 13-20 * * 1-5" # Intraday: 13:00–20:45 UTC
    - cron: "30 21 * * 1-5"   # Pós-fechamento: 21:30 UTC
    - cron: "0 10 * * 0"      # Descoberta semanal de opções: domingo 10:00 UTC

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    if: github.event.schedule != '0 10 * * 0'
    runs-on: ubuntu-latest
    env:
      BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
      DATA_PROVIDER: brapi
      ALLOW_MOCK_FALLBACK: "false"

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: python -m pip install -r requirements.txt

      - name: Validar BRAPI_TOKEN
        shell: bash
        run: |
          if [ -z "${BRAPI_TOKEN:-}" ]; then
            echo "Erro: o secret BRAPI_TOKEN não foi configurado no repositório."
            exit 1
          fi
          echo "Secret BRAPI_TOKEN detectado."

      - name: Definir modo de execução
        id: mode
        shell: bash
        env:
          MANUAL_MODE: ${{ inputs.mode }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            MODE="$MANUAL_MODE"
          else
            HOUR=$(date -u +%H)
            HOUR=$((10#$HOUR))
            if [ "$HOUR" -lt 13 ]; then
              MODE="premarket"
            elif [ "$HOUR" -lt 21 ]; then
              MODE="intraday"
            else
              MODE="close"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Modo selecionado: $MODE"

      - name: Atualizar snapshots
        id: market_update
        continue-on-error: true
        run: python scripts/run_pipeline.py --mode "${{ steps.mode.outputs.mode }}"

      - name: Mostrar resumo seguro
        shell: bash
        run: |
          echo "Modo executado: ${{ steps.mode.outputs.mode }}"
          echo "Resultado da atualização: ${{ steps.market_update.outcome }}"
          echo "Arquivos persistidos pelo pipeline em data/runtime/"
          echo "Opportunity Engine: MOCK / EXEMPLO"

      - name: Commitar arquivos atualizados
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/runtime/market_snapshots.json data/runtime/update_status.json data/runtime/real_opportunities_snapshot.json data/runtime/graphical_theses_snapshot.json data/runtime/pipeline_status.json data/runtime/options_eod_status.json data/runtime/options_snapshots
          if git diff --cached --quiet; then
            echo "Sem alterações para commitar."
          else
            git commit -m "Atualiza snapshots de mercado"
            git push
          fi

      - name: Sinalizar falha da atualização
        if: steps.market_update.outcome == 'failure'
        shell: bash
        run: |
          echo "Erro: a atualização da brapi falhou. O estado foi registrado em data/runtime/update_status.json."
          exit 1

  discover-options-universe:
    if: github.event.schedule == '0 10 * * 0'
    runs-on: ubuntu-latest
    env:
      BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
      DATA_PROVIDER: brapi
      ALLOW_MOCK_FALLBACK: "false"
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependências
        run: python -m pip install -r requirements.txt
      - name: Validar BRAPI_TOKEN
        shell: bash
        run: |
          if [ -z "${BRAPI_TOKEN:-}" ]; then
            echo "Erro: o secret BRAPI_TOKEN não foi configurado no repositório."
            exit 1
          fi
          echo "Secret BRAPI_TOKEN detectado."
      - name: Descobrir universo real de opções
        run: python scripts/discover_options_universe.py --limit 30
      - name: Commitar mapa de disponibilidade
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/runtime/options_universe_availability.json
          if git diff --cached --quiet; then
            echo "Sem alterações para commitar."
          else
            git commit -m "Atualiza universo real de opções"
            git push
          fi
